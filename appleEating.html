<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Видео фон</title>
  <style>
    /* Обнуляем отступы и поля */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Создаем контейнер, который будет занимать весь экран */
    body, html {
      height: 100%;
    }

    /* Ставим видео на весь экран */
    .video-background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover; /* Подгоняем видео по размеру экрана */
      z-index: -1; /* Видео будет находиться за содержимым страницы */
    }

    /* Содержимое страницы */
    .content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: white;
      font-size: 2rem;
      z-index: 1;
    }
  </style>
</head>
<body>
  <video autoplay muted loop class="video-background">
    <source src="apple-eating.webm" type="video/webm">
    Ваш браузер не поддерживает видео.
  </video>
</body>
</html>
