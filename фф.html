<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Видео фон</title>
  <style>
    /* Обнуляем отступы и поля */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Убедимся, что body и html занимают всю высоту экрана */
    body, html {
      height: 100%;
      width: 100%;
      overflow: hidden; /* Убираем прокрутку по экрану */
    }

    /* Ставим видео на весь экран */
    .video-background {
      position: fixed; /* Видео фиксируется относительно экрана */
      top: 50%; /* Центрируем видео по вертикали */
      left: 50%; /* Центрируем видео по горизонтали */
      width: 100vw; /* Видео должно занимать всю ширину */
      height: 100vh; /* Видео должно занимать всю высоту */
      object-fit: cover; /* Видео будет растягиваться, чтобы покрыть весь экран */
      transform: translate(-50%, -50%); /* Центрируем видео в окне */
      z-index: -1; /* Видео всегда будет находиться на заднем фоне */
    }

    /* Контент страницы */
    .content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: white;
      font-size: 2rem;
      z-index: 1; /* Содержимое будет поверх видео */
    }
  </style>
</head>
<body>
  <!-- Видео как фон -->
  <video autoplay muted loop class="video-background">
    <source src="./src/apple-eating.webm" type="video/webm">
    Ваш браузер не поддерживает видео.
  </video>

  <!-- Контент, который будет поверх видео -->
  <div class="content">
    <h1>Добро пожаловать!</h1>
    <p>Текст поверх видео фона</p>
  </div>
</body>
</html>
